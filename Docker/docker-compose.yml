services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: edwin
      POSTGRES_PASSWORD: edwin123
      POSTGRES_DB: prueba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    # Docker buscará el Dockerfile en la carpeta 'backend' que está junto a este archivo
    build: ./backend
    container_name: python_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://edwin:edwin123@db:5432/prueba
    ports:
      - "8000:8000"
    volumes:
      # Sincroniza tu código para que los cambios en VS Code se vean en el contenedor
      - ./backend:/app

  frontend:
    # Ajustado al nombre de tu carpeta 'fronend' (sin la t)
    build: ./frontend
    container_name: react_native_app
    restart: always
    depends_on:
      - backend
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "8081:8081"
    volumes:
      - ./frontend:/app
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  pgadmin_data: